name: Build & deploy KORA storefront

on:
  push:
    branches: [main]
  workflow_dispatch: {}          # manual "rebuild now" button
  repository_dispatch:            # Wix Automation -> webhook -> rebuild on catalogue/About change
    types: [wix-content-updated]
  schedule:
    - cron: '0 2 * * *'          # daily safety-net rebuild (02:00 UTC)

# Allow GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      - name: Build (pulls live catalogue + About from Wix, then bundles)
        run: npm run build
        env:
          WIX_CLIENT_ID: ${{ secrets.WIX_CLIENT_ID }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
