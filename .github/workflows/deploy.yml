name: Build & deploy KORA storefront

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  repository_dispatch:
    types: [wix-content-updated]
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      - name: Build (pulls live catalogue + content from Wix, then bundles)
        run: npm run build
        env:
          WIX_CLIENT_ID: ${{ secrets.WIX_CLIENT_ID }}
      - uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
